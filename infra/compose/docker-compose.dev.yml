version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce_dev
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: meilisearch_dev_key
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://ecommerce:ecommerce_dev@postgres:5432/ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: meilisearch_dev_key
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: ecommerce
      JWT_SECRET: dev_jwt_secret_change_in_production
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production
      ENCRYPTION_KEY: dev_encryption_key_32chars_change
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/api:/app/apps/api
      - /app/apps/api/node_modules
      - ../../packages:/app/packages
      - /app/node_modules

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
      target: development
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://ecommerce:ecommerce_dev@postgres:5432/ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: meilisearch_dev_key
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: ecommerce
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/worker:/app/apps/worker
      - /app/apps/worker/node_modules
      - ../../packages:/app/packages

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: development
    depends_on:
      - api
    volumes:
      - ../../apps/web:/app/apps/web
      - /app/apps/web/node_modules
      - /app/apps/web/.next

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
